name: CI-CD DevSecOps Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # STAGE 1: STATIC APPLICATION SECURITY TESTING (SAST)
  # ==========================================
  sonarcloud:
    name: Code Quality & Security Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Engine Analysis Execution
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # STAGE 2: SOFTWARE COMPOSITION ANALYSIS (SCA) & REGISTRY PUSH
  # ==========================================
  container-security:
    name: Container Build, Scan & Push (SCA Lifecycle)
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Tree
        uses: actions/checkout@v4

      - name: Set up Docker Buildx Framework
        uses: docker/setup-buildx-action@v3

      - name: Build Local Production-Ready Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest

      - name: Run Aqua Security Trivy (Vulnerability Assessment)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Authenticate to DockerHub Secure Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Compliant Secure Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT & MONITORING SETUP
  # ==========================================
  deploy-to-kubernetes:
    name: Continuous Deployment (CD to K8s)
    needs: container-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Deployment Manifests
        uses: actions/checkout@v4

      - name: Set up Kubeconfig Authorization Gateway
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Inject Configuration Variables & Apply Manifests
        run: |
          # Dynamic Username & Image Tag Replacement
          sed -i 's/DOCKERHUB_USERNAME/${{ secrets.DOCKERHUB_USERNAME }}/g' k8s/deployment.yaml
          sed -i 's|:latest|:${{ github.sha }}|g' k8s/deployment.yaml
          
          # Core Application Deployment
          kubectl apply -f k8s/deployment.yaml --insecure-skip-tls-verify
          kubectl apply -f k8s/service.yaml --insecure-skip-tls-verify
          
          # Automated Real-Time Monitoring Infrastructure Rollout
          kubectl apply -f k8s/monitoring/prometheus.yaml --insecure-skip-tls-verify
          kubectl apply -f k8s/monitoring/grafana.yaml --insecure-skip-tls-verify

      - name: Verify Live Rolling Update Status
        run: |
          kubectl rollout status deployment/devsecops-app-deployment --timeout=120s --insecure-skip-tls-verify

  # ==========================================
  # STAGE 4: DYNAMIC APPLICATION SECURITY TESTING (DAST)
  # ==========================================
  dast-zap-scan:
    name: OWASP ZAP DAST Live Penetration Scan
    needs: deploy-to-kubernetes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Execute OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://3.81.186.109:30080'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false

      - name: Upload ZAP Security HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-zap-dast-report
          path: report_html.html