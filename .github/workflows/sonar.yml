name: CI-CD DevSecOps Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # STAGE 1: STATIC APPLICATION SECURITY TESTING (SAST)
  # ==========================================
  sonarcloud:
    name: Code Quality & Security Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Engine Analysis Execution
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # STAGE 2: SOFTWARE COMPOSITION ANALYSIS (SCA) & REGISTRY PUSH
  # ==========================================
  container-security:
    name: Container Build, Scan & Push (SCA Lifecycle)
    needs: sonarcloud # Strict Security Gate: Source Code check pass hone par hi chalega
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Tree
        uses: actions/checkout@v4

      - name: Set up Docker Buildx Framework
        uses: docker/setup-buildx-action@v3

      - name: Build Local Production-Ready Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest .

      - name: Run Aqua Security Trivy (Vulnerability Assessment)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest'
          format: 'table'
          exit-code: '1' # Critical Vulnerability milne par pipeline yahi crash hokar CD block karegi
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'          

      - name: Authenticate to DockerHub Secure Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Compliant Secure Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (ORCHESTRATION LAYER)
  # ==========================================
  deploy-to-kubernetes:
    name: Continuous Deployment (CD to K8s)
    needs: container-security # Final Security Gate: Scanner approved safe artifacts hi target honge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Deployment Manifests
        uses: actions/checkout@v4

      - name: Set up Kubeconfig Authorization Gateway
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Inject Configuration Variables & Apply Manifests
        run: |
          # Dynamic placeholder processing to map authenticated username inside deployment spec
          sed -i 's/DOCKERHUB_USERNAME/${{ secrets.DOCKERHUB_USERNAME }}/g' k8s/deployment.yaml
          
          # Target deployment state synchronized execution
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify Live Rolling Update Status
        run: |
          # 120s dynamic boundary checkout for zero-downtime health matrix check
          kubectl rollout status deployment/devsecops-app-deployment --timeout=120s