name: Sonar Scan

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      # Latest secure repository checkout mechanism
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Verified Drop-in Replacement with latest security patches (v6)
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}