name: CI-CD DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container-security:
    name: Container Build, Scan & Push
    needs: sonarcloud # Yeh job tabhi chalegi jab SonarCloud scan PASS hoga
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Step 1: Set up Docker Buildx (Modern image building framework)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 2: Build the Docker Image Locally
      - name: Build Local Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest .

      # Step 3: Vulnerability Scanning using Aqua Security Trivy
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest'
          format: 'table'
          exit-code: '1' # Agar CRITICAL vulnerability mili, to pipeline yahi fail ho jayegi
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Step 4: Login to DockerHub (Only executes if scan is clean)
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 5: Push Secure Image to DockerHub Registry
      - name: Push Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest