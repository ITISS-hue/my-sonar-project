name: CI-CD DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  sonarcloud:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container-security:
    name: Container Build, Scan & Push
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true          
          vuln-type: 'os,library'
          severity: 'CRITICAL'          

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-sonar-project:latest