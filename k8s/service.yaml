apiVersion: v1
kind: Service
metadata:
  name: devsecops-app-service
spec:
  type: NodePort # AWS EC2 instance par direct external port open karne ke liye
  selector:
    app: devsecops-app
  ports:
    - protocol: TCP
      port: 80         # Cluster ke andar ka internal traffic port
      targetPort: 80   # Aapke Docker container ka code internal port
      nodePort: 30080  # Public browser access port (EC2-IP:30080)